spring:
  application:
    name: domain-customer-kyc-kyb
    version: 1.0.0
    description: Domain Customer KYC/KYB Layer Application
    team:
      name: Firefly Software Foundation
      email: dev@getfirefly.io
  threads:
    virtual:
      enabled: true

firefly:
  cqrs:
    enabled: true
    command:
      timeout: 30s
      metrics-enabled: true
      tracing-enabled: true
    query:
      timeout: 15s
      caching-enabled: true
      cache-ttl: 15m
  saga.performance.enabled: true
  eda:
    enabled: true
    default-publisher-type: KAFKA
    default-connection-id: default
    publishers:
      kafka:
        default:
          enabled: true
          default-topic: domain-layer
          bootstrap-servers: localhost:9092
  stepevents:
    enabled: true

server:
  address: ${SERVER_ADDRESS:localhost}
  port: ${SERVER_PORT:8081}
  shutdown: graceful

api-configuration:
  core-platform:
    kycb-mgmt:
      base-path: http://localhost:8092
      timeout: 10s

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tagsSorter: alpha
    operationsSorter: method
    docExpansion: none
    filter: true
  packages-to-scan: com.firefly.domain.kyc.kyb.web.controller
  paths-to-match: /api/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

---
spring:
  config:
    activate:
      on-profile: dev
logging:
  level:
    root: INFO
    com.firefly: DEBUG

---
spring:
  config:
    activate:
      on-profile: pre
logging:
  level:
    root: INFO
    com.firefly: DEBUG

---
spring:
  config:
    activate:
      on-profile: pro
logging:
  level:
    root: WARN
    com.firefly: INFO
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
